<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      --glass-highlight: rgba(255, 255, 255, 0.5);
      --blur: 20px;
      --blue: #007AFF;
      --blue-light: rgba(0, 122, 255, 0.35);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --x-color: #FF6B6B;
      --o-color: #4ECDC4;
      --win-glow: rgba(255, 255, 100, 0.5);
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
      overflow: hidden;
    }

    /* Animated blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: blobFloat 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 400px; height: 400px; background: #533483; top: -10%; left: -10%; animation-delay: 0s; }
    .blob-2 { width: 350px; height: 350px; background: #007AFF; bottom: -10%; right: -5%; animation-delay: -3s; }
    .blob-3 { width: 300px; height: 300px; background: #FF6B6B; top: 50%; left: 60%; animation-delay: -5s; }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 20px) scale(0.95); }
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 16px;
    }

    /* Glass card */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border-radius: 24px;
      box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
    }

    /* Header */
    .header {
      padding: 28px 40px 20px;
      text-align: center;
      width: 100%;
      max-width: 380px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .title span {
      background: linear-gradient(90deg, var(--x-color), var(--blue), var(--o-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      max-width: 380px;
      width: 100%;
      gap: 12px;
    }

    .score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .score-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .score-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .score-block.x .score-label { color: var(--x-color); }
    .score-block.o .score-label { color: var(--o-color); }

    .score-divider {
      width: 1px;
      height: 36px;
      background: var(--glass-border);
    }

    /* Turn indicator */
    .turn-badge {
      padding: 10px 20px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .turn-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      transition: color 300ms ease;
    }

    .turn-indicator {
      display: inline-block;
      font-weight: 700;
      transition: color 300ms ease;
    }

    .turn-indicator.x { color: var(--x-color); }
    .turn-indicator.o { color: var(--o-color); }

    /* Board */
    .board-wrapper {
      padding: 20px;
      max-width: 380px;
      width: 100%;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      aspect-ratio: 1;
    }

    .cell {
      position: relative;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 200ms ease, border-color 200ms ease, transform 150ms ease, box-shadow 200ms ease;
      overflow: hidden;
    }

    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .cell:hover:not(.taken) {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .cell:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }

    .cell.taken { cursor: default; }

    .cell.winner {
      background: rgba(255, 255, 100, 0.12);
      border-color: rgba(255, 255, 100, 0.5);
      box-shadow: 0 0 20px rgba(255, 255, 100, 0.25), inset 0 0 15px rgba(255, 255, 100, 0.1);
      animation: winPulse 1.2s ease-in-out infinite;
    }

    @keyframes winPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 100, 0.25), inset 0 0 15px rgba(255, 255, 100, 0.1); }
      50% { box-shadow: 0 0 35px rgba(255, 255, 100, 0.45), inset 0 0 25px rgba(255, 255, 100, 0.2); }
    }

    /* SVG marks */
    .mark-svg {
      width: 52%;
      height: 52%;
      opacity: 0;
      transform: scale(0.4) rotate(-15deg);
      transition: none;
    }

    .mark-svg.show {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      transition: opacity 250ms ease, transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mark-x { stroke: var(--x-color); }
    .mark-o { stroke: var(--o-color); }

    /* Draw path animation */
    .mark-x line {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
    }
    .mark-o circle {
      stroke-dasharray: 90;
      stroke-dashoffset: 90;
    }
    .mark-svg.show .mark-x line,
    .mark-svg.show .mark-o circle {
      animation: drawMark 300ms ease forwards;
    }
    @keyframes drawMark {
      to { stroke-dashoffset: 0; }
    }

    /* Result overlay */
    .result-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 400ms ease;
    }

    .result-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .result-card {
      padding: 40px 48px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.85) translateY(20px);
      transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .result-overlay.show .result-card {
      transform: scale(1) translateY(0);
    }

    .result-icon {
      width: 64px;
      height: 64px;
    }

    .result-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
    }

    .result-sub {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 200ms, transform 150ms, box-shadow 200ms;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--blue-light);
      border-color: rgba(0, 122, 255, 0.5);
    }

    .btn-primary:hover {
      background: rgba(0, 122, 255, 0.5);
    }

    /* Reset row */
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 0 20px 20px;
    }

    @media (prefers-reduced-motion: reduce) {
      .blob, .cell, .mark-svg, .result-overlay, .result-card { animation: none; transition: none; }
    }
  </style>
</head>
<body>

<!-- Background blobs -->
<div class="blob blob-1" aria-hidden="true"></div>
<div class="blob blob-2" aria-hidden="true"></div>
<div class="blob blob-3" aria-hidden="true"></div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
  <div class="glass-card result-card">
    <svg class="result-icon" id="resultIcon" viewBox="0 0 64 64" fill="none" aria-hidden="true"></svg>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-sub" id="resultSub"></div>
    <button class="btn btn-primary" onclick="startNewRound()" style="margin-top:8px">
      Play Again
    </button>
  </div>
</div>

<main class="container">
  <!-- Header -->
  <div class="glass-card header">
    <div class="title"><span>Tic-Tac-Toe</span></div>
  </div>

  <!-- Scores -->
  <div class="glass-card status-bar" aria-label="Scores">
    <div class="score-block x">
      <div class="score-label">Player X</div>
      <div class="score-value" id="scoreX">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-block">
      <div class="score-label">Draws</div>
      <div class="score-value" id="scoreD">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-block o">
      <div class="score-label">Player O</div>
      <div class="score-value" id="scoreO">0</div>
    </div>
  </div>

  <!-- Turn -->
  <div class="glass-card turn-badge" aria-live="polite">
    <div class="turn-text" id="turnText">
      Turn: <span class="turn-indicator x" id="turnIndicator">X</span>
    </div>
  </div>

  <!-- Board -->
  <div class="glass-card board-wrapper">
    <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn" onclick="startNewRound()" aria-label="New round">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
      New Round
    </button>
    <button class="btn" onclick="resetAll()" aria-label="Reset scores">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6M14 11v6"></path>
      </svg>
      Reset All
    </button>
  </div>
</main>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;
  let scores = { X: 0, O: 0, D: 0 };

  function buildBoard() {
    const grid = document.getElementById('board');
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', `Cell ${i + 1}, empty`);
      cell.setAttribute('data-index', i);
      cell.setAttribute('tabindex', '0');
      cell.innerHTML = `
        <svg class="mark-svg mark-x" viewBox="0 0 40 40" fill="none" stroke-width="4" stroke-linecap="round" aria-hidden="true">
          <line x1="10" y1="10" x2="30" y2="30"/>
          <line x1="30" y1="10" x2="10" y2="30"/>
        </svg>
        <svg class="mark-svg mark-o" viewBox="0 0 40 40" fill="none" stroke-width="4" stroke-linecap="round" aria-hidden="true">
          <circle cx="20" cy="20" r="12"/>
        </svg>`;
      cell.addEventListener('click', () => handleMove(i));
      grid.appendChild(cell);
    }
  }

  function handleMove(index) {
    if (gameOver || board[index]) return;

    board[index] = currentPlayer;
    renderCell(index, currentPlayer);

    const winLine = checkWin();
    if (winLine) {
      highlightWin(winLine);
      scores[currentPlayer]++;
      updateScores();
      gameOver = true;
      setTimeout(() => showResult('win', currentPlayer), 600);
      return;
    }

    if (board.every(Boolean)) {
      scores.D++;
      updateScores();
      gameOver = true;
      setTimeout(() => showResult('draw'), 400);
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateTurnUI();
  }

  function renderCell(index, player) {
    const cell = document.querySelector(`[data-index="${index}"]`);
    cell.classList.add('taken');
    cell.setAttribute('aria-label', `Cell ${index + 1}, ${player}`);

    const svg = cell.querySelector(player === 'X' ? '.mark-x' : '.mark-o');
    // Force reflow to restart animation
    svg.classList.remove('show');
    void svg.offsetWidth;
    svg.classList.add('show');
  }

  function checkWin() {
    for (const line of WINS) {
      const [a, b, c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
    }
    return null;
  }

  function highlightWin(line) {
    line.forEach(i => {
      document.querySelector(`[data-index="${i}"]`).classList.add('winner');
    });
  }

  function updateTurnUI() {
    const ind = document.getElementById('turnIndicator');
    ind.textContent = currentPlayer;
    ind.className = `turn-indicator ${currentPlayer.toLowerCase()}`;
  }

  function updateScores() {
    document.getElementById('scoreX').textContent = scores.X;
    document.getElementById('scoreO').textContent = scores.O;
    document.getElementById('scoreD').textContent = scores.D;
  }

  function showResult(type, winner) {
    const overlay = document.getElementById('resultOverlay');
    const title = document.getElementById('resultTitle');
    const sub = document.getElementById('resultSub');
    const icon = document.getElementById('resultIcon');

    if (type === 'win') {
      const color = winner === 'X' ? '#FF6B6B' : '#4ECDC4';
      title.textContent = `Player ${winner} Wins!`;
      sub.textContent = 'Congratulations!';
      icon.innerHTML = `
        <circle cx="32" cy="32" r="30" stroke="${color}" stroke-width="3" fill="none"/>
        <polyline points="18,32 28,42 46,22" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
    } else {
      title.textContent = "It's a Draw!";
      sub.textContent = 'Well played by both!';
      icon.innerHTML = `
        <circle cx="32" cy="32" r="30" stroke="#ffffff80" stroke-width="3" fill="none"/>
        <line x1="20" y1="32" x2="44" y2="32" stroke="#ffffff80" stroke-width="4" stroke-linecap="round"/>`;
    }

    overlay.classList.add('show');
  }

  function startNewRound() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver = false;
    document.getElementById('resultOverlay').classList.remove('show');
    updateTurnUI();
    buildBoard();
  }

  function resetAll() {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    startNewRound();
  }

  // Init
  buildBoard();
</script>
</body>
</html>
